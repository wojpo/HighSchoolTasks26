services:
  traefik:
    image: docker.io/traefik:v3.7@sha256:6b9cbca6fac42ab0075f5437d8dc1685cfd188626d8d515839ea94f8b6271c42
    container_name: traefik
    restart: always
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedByDefault=false"
      - "--providers.docker.network=bridge"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.solr.address=:8983"
    ports:
      - target: 80
        published: 8000
        mode: host
      - target: 8080
        published: 8080
        mode: host
      - target: 8983
        published: 8983
        protocol: tcp
        mode: ingress
    volumes:
      - "${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock"
    networks:
      - bridge-net
    deploy:
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=bridge"
        - "traefik.http.routers.api.rule=Host(`traefik.localhost`)"
        - "traefik.http.routers.api.service=api@internal"

networks:
  bridge-net:
    external: true
    name: bridge
