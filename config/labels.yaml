# This file defines the labels used in the project.
# Labels are used to categorize tasks based on their type.
labels:
  - name: "Real World"
    id: "real_world"
    description: "Wyzwania inspirowane rzeczywistymi scenariuszami wykorzystania podatności binarnych."
  - name: "Physical"
    id: "physical"
    description: "Zadania wymagające fizycznej interakcji lub myślenia poza standardowymi ramami CTF."
  - name: "Partner"
    id: "partner"
    description: "Zadania przygotowane we współpracy z partnerami — mogą obejmować różne typy wyzwań."
  - name: "Games"
    id: "games"
    description: "Zadania stylizowane na gry, często wymagające interakcji lub analizy binarnej logiki rozgrywki."
  - name: "PWN"
    id: "pwn"
    description: "Eksploatacja binarek w celu przejęcia kontroli nad procesem lub wykonania nieautoryzowanego kodu."
  - name: "Misc"
    id: "misc"
    description: "Różne nietypowe zadania, które nie pasują do innych kategorii."
  - name: "Crypto"
    id: "crypto"
    description: "Zadania z zakresu kryptografii – analiza, łamanie lub wykorzystanie algorytmów kryptograficznych."
  - name: "Reverse Engineering"
    id: "reverse_engineering"
    description: "Analiza odwrotna aplikacji binarnych w celu zrozumienia ich działania lub znalezienia flagi."
  - name: "Web"
    id: "web"
    description: "Wykorzystanie podatności aplikacji webowych do uzyskania nieautoryzowanego dostępu lub manipulacji danymi."
