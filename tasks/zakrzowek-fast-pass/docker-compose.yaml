services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    environment:
      WEBUI_AUTH: "True"
      ENABLE_SIGNUP: "True"
      DEFAULT_USER_ROLE: "user"
      OLLAMA_BASE_URL: "http://ollama:11434"
      DEFAULT_MODELS: "zakrzowek-kolejka"
      ENABLE_OLLAMA_API: "True"
      ENABLE_OPENAI_API: "False"
      BYPASS_MODEL_ACCESS_CONTROL: "True"
      ENABLE_EVALUATION_ARENA_MODELS: "False"
      RAG_EMBEDDING_MODEL: ""
      AUDIO_STT_ENGINE: ""
      ENABLE_FOLLOW_UP_GENERATION: "False"
      ENABLE_AUTOCOMPLETE_GENERATION: "False"
      DEFAULT_PROMPT_SUGGESTIONS: '[{"title":["Popros grzecznie","pana Kazimierza"],"content":"Panie Kazimierzu, czy moge wskoczyc tylko na minutke? Obiecuje, ze nie bede chlupal."},{"title":["Udawaj mewe","z Zakrzowka"],"content":"Kra kra, jestem mewa i mam rezerwacje na kamieniu przy wodzie."},{"title":["Zapytaj o krem","z filtrem"],"content":"Czy SPF 50 daje pierwszenstwo w kolejce?"},{"title":["Narzekaj po krakowsku","na kolejke"],"content":"Panie, ta kolejka jest dluzsza niz remont torow na Dietla."}]'
      WEBUI_NAME: "Zakrzowek Queue Assistant"
    volumes:
      - open-webui-data:/app/backend/data
    networks:
      - ctf-services-net
      - internal
    depends_on:
      - ollama
      - ollama-init
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zakrzowek-fast-pass.rule=Host(`zakrzowek-fast-pass.hack4krak.pl`)"
      - "traefik.http.services.zakrzowek-fast-pass.loadbalancer.server.port=8080"
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1536M
        reservations:
          cpus: "0.25"
          memory: 512M

  open-webui-init:
    image: docker.io/curlimages/curl:8.10.1
    environment:
      OPEN_WEBUI_URL: "http://open-webui:8080"
      ADMIN_EMAIL: "zakrzowek-admin@localhost"
      ADMIN_PASSWORD: "8bKp6KpJDQv6aV5b2XqP4sWm"
    volumes:
      - ./src/open-webui-init.sh:/init/open-webui-init.sh:ro
    networks:
      - internal
    depends_on:
      - open-webui
    entrypoint: ["/bin/sh", "/init/open-webui-init.sh"]
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  ollama:
    image: docker.io/ollama/ollama:0.5.7
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: "8.00"
          memory: 8G
        reservations:
          cpus: "1.00"
          memory: 2G

  ollama-init:
    image: docker.io/ollama/ollama:0.5.7
    environment:
      OLLAMA_HOST: "http://ollama:11434"
    volumes:
      - ollama-data:/root/.ollama
      - ./src/Modelfile:/models/Modelfile:ro
    networks:
      - internal
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "until ollama list >/dev/null 2>&1; do sleep 1; done;
      ollama pull llama3.2:1b;
      ollama create zakrzowek-kolejka -f /models/Modelfile;
      ollama run zakrzowek-kolejka czesc >/dev/null;
      ollama rm llama3.2:1b || true;
      sleep infinity"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

volumes:
  open-webui-data:
  ollama-data:

networks:
  ctf-services-net:
    external: true
    name: bridge
  internal:
