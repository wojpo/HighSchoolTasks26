services:
  dratewka-simulator:
    image: itzg/minecraft-server:stable-java25
    stdin_open: true
    ports:
      - target: 25565
        published: 25565
        protocol: tcp
        mode: host
    security_opt:
      - no-new-privileges:true
    deploy:
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "3"
          memory: 7G
    environment:
      EULA: "TRUE"
      TYPE: "PURPUR"
      MEMORY: "6G"
      COPY_CONFIG_DEST: "/data"
      SYNC_SKIP_NEWER_IN_DESTINATION: "false"
      USE_MEOWICE_FLAGS: "true"
      ONLINE_MODE: "false"
      DIFFICULTY: "hard"
      GAMEMODE: "survival"
      MOTD: "czas leci!!!"
      VIEW_DISTANCE: "8"
      SIMULATION_DISTANCE: "6"
      SPAWN_PROTECTION: "0"
      BUG_REPORT_LINK: "https://discord.gg/ASPqckzEd8"
      RESOURCE_PACK: "https://cdn.modrinth.com/data/K4CZat30/versions/OmbYrI4q/respack.zip"
      ENFORCE_SECURE_PROFILE: "false"
      RCON_CMDS_ON_CONNECT: |-
        demo @a
    configs:
      - source: dratewka-simulator-bukkit
        target: /config/bukkit.yml
    volumes:
      - dratewka-simulator:/data

configs:
  dratewka-simulator-bukkit:
    file: ./bukkit.yml

volumes:
  dratewka-simulator:
